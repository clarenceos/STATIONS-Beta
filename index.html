        <button class="btn-ghost btn-sm flex1" onclick="event.stopPropagation();exportWod('${esc(wod.id)}')">Export</button>
        ${!wod.isPrebuilt ? `<button class="btn-ghost btn-sm" onclick="event.stopPropagation();confirmDeleteWod('${esc(wod.id)}','${esc(wod.name)}')" style="min-width:36px;width:36px;padding:0;color:var(--error);border-color:var(--error-dim);">${icons.trash}</button>` : ''}
      </div>
      <button class="btn-primary btn-full" onclick="event.stopPropagation();${wod.tabataMode ? `startTabataAdvancedWod('${esc(wod.id)}')` : wod.hiitMode ? `startHiitAdvancedWod('${esc(wod.id)}')` : `startLibraryWod('${esc(wod.id)}')`}">${icons.play} Start</button>
    </div>` : '';

    listHtml += `
    <div style="background:var(--bg-page);background-image:radial-gradient(circle,var(--bronze-ghost) 1px,transparent 1px);background-size:22px 22px;border:1px solid var(--rule);border-radius:var(--radius-card);margin-bottom:8px;overflow:hidden;cursor:pointer;"
      onclick="toggleLibraryExpand('${esc(wod.id)}')">
      <div style="padding:10px 14px;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase;color:var(--text-hi);">${esc(wod.name)}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;">
            <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-lo);">${stCount} station${stCount!==1?'s':''}</span>
            ${prebuiltBadge}
            ${emomBadge}
            ${tabataBadge}
            ${hiitBadge}
            ${tagPills}
          </div>
        </div>
        <div style="color:var(--text-lo);font-size:16px;transition:transform 0.2s;transform:rotate(${isExpanded?'90':'0'}deg);">›</div>
      </div>
      ${expandedContent}
    </div>`;
  }

  if (!listHtml) {
    listHtml = `<div style="text-align:center;padding:32px 0;color:var(--text-lo);font-family:'DM Sans',sans-serif;">No WODs found.</div>`;
  }

  document.getElementById('screen-wod-library').innerHTML = `
  <div class="nav-header">
    <div class="nav-back" onclick="nav('home')">← Back</div>
    <div class="nav-title">WOD Library</div>
    <div style="display:flex;gap:8px;">
      <button class="btn-ghost btn-sm" onclick="importWod()" title="Import WOD">Import</button>
      <button class="btn-primary btn-sm" onclick="openNewWodSheet()">+ New</button>
    </div>
  </div>

  <div class="screen-header" style="margin-bottom:12px;">
    <div class="screen-overline">Training Library</div>
    <div class="screen-title">WOD Library</div>
    <div class="header-rule"></div>
  </div>

  <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;">
    <div class="pill ${S.libraryWodFilter==='all'?'active':''}" onclick="setLibraryWodFilter('all')">All</div>
    <div class="pill ${S.libraryWodFilter==='stations'?'active':''}" onclick="setLibraryWodFilter('stations')">STATIONS</div>
    <div class="pill ${S.libraryWodFilter==='emom'?'active':''}" onclick="setLibraryWodFilter('emom')">EMOM</div>
    <div class="pill ${S.libraryWodFilter==='tabata'?'active':''}" onclick="setLibraryWodFilter('tabata')">Tabata</div>
    <div class="pill ${S.libraryWodFilter==='hiit'?'active':''}" onclick="setLibraryWodFilter('hiit')">HIIT</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <button class="btn-ghost btn-sm" onclick="openTagFilterModal()" style="color:${activeFilters.length > 0 ? 'var(--yellow)' : 'var(--text-mid)'};border-color:${activeFilters.length > 0 ? 'rgba(212,224,0,0.3)' : 'var(--rule)'};">&#127991; Filter${activeFilters.length > 0 ? ` (${activeFilters.length})` : ''}</button>
    ${activeFilters.length > 0 ? `<button class="btn-ghost btn-sm" onclick="clearLibraryFilters()" style="font-size:12px;color:var(--text-lo);">Clear</button>` : ''}
    <span style="font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text-lo);margin-left:auto;">${filteredWods.length} WOD${filteredWods.length !== 1 ? 's' : ''}</span>
  </div>
  <div>${listHtml}</div>`;
}

  S.libraryExpandedId = S.libraryExpandedId === id ? null : id;

function saveTabataSimpleSettings() {
  DB.put('settings', { id: 'tabata-simple-last', ...S.tabataSimple });
}

async function loadTabataSimpleSettings() {
  const saved = await DB.get('settings', 'tabata-simple-last');
  if (saved) {
    S.tabataSimple.warmup = saved.warmup || 0;
    S.tabataSimple.blocks = saved.blocks || 1;
    S.tabataSimple.blockRest = saved.blockRest || 60;
    S.tabataSimple.cooldown = saved.cooldown || 0;
  }
}

function startTabataSimple() {
  const ts = S.tabataSimple;
  const th = S.tabataHiit;
  th.mode = 'tabata-simple';
  th.active = false;
  th.paused = false;
  th.startMs = 0;
  th.totalPausedMs = 0;
  th.pauseStartMs = 0;
  th.sessionId = uid();
  th.wod = null;
  th.blocks = Array(ts.blocks).fill(null).map((_, i) => ({ name: `Block ${i + 1}`, slots: [] }));
  th.blockIdx = 0;
  th.slotIdx = 0;
  th.warmupDuration = ts.warmup;
  th.cooldownDuration = ts.cooldown;
  th.blockRestDuration = ts.blockRest;
  th.workDuration = 20;
  th.restDuration = 10;
  th.currentRound = 1;
  th.totalRounds = ts.blocks;
  th.halfFired = false;
  th.fiveCountFired = 0;
  th.phaseLapLog = []; th.currentPhaseStartMs = 0;

  showScreen('timer');

  if (ts.warmup > 0) {
    startTabataHiitPhase('warmup', ts.warmup);
  } else {
    th.blockIdx = 0;
    th.slotIdx = 0;
    startTabataHiitPhase('work', 20);
  }
}

    openTabataAdvancedSetup();
  });
}

async function saveTabataAdvancedWod() {
  const name = (document.getElementById('tabata-adv-name')?.value || S._tabataAdvancedName || '').trim() || `Tabata · ${todayStr()}`;

async function startTabataAdvancedWod(id) {
  const wod = await DB.get('wods', id);
  if (!wod) return;
  const blockIds = wod.tabataBlocks || [];
  const blocks = [];
  const allExercises = await DB.all('exercises');
  for (const bid of blockIds) {
    const blk = await DB.get('tabataBlocks', bid);
    if (blk) {
      const loaded = JSON.parse(JSON.stringify(blk));
      for (const slot of loaded.slots) {
        slot._exercise = slot.exerciseId ? allExercises.find(e => e.id === slot.exerciseId) : null;
      }
      blocks.push(loaded);
    }
  }
  if (blocks.length === 0) { toast('No blocks found in this WOD'); return; }

  const th = S.tabataHiit;
  th.mode = 'tabata-advanced';
  th.active = false; th.paused = false;
  th.startMs = 0; th.totalPausedMs = 0; th.pauseStartMs = 0;

  th.blocks = blocks;

  th.currentRound = 1; th.totalRounds = blocks.length;
  th.halfFired = false; th.fiveCountFired = 0;

  showScreen('timer');

// ============================================================
// TABATA / HIIT PHASE ENGINE
// ============================================================

function startTabataHiitPhase(phase, durationSecs) {
  const th = S.tabataHiit;
  th.phase = phase;
  th.active = true;
  th.paused = false;

  if (th.startMs === 0) th.startMs = performance.now();

  const dur = durationSecs * 1000;
  th.phaseEndMs = performance.now() + dur;
  th.currentPhaseStartMs = performance.now();
  th.halfFired = false;
  th.fiveCountFired = 0;

  if (S.settings.voiceMode !== 'none') {
    if (phase === 'warmup') {
      speak('Warmup starting');
    } else if (phase === 'work') {
      const label = getTabataHiitCurrentLabel();
      if (label) speak(speakify(label));
    } else if (phase === 'rest') {
      const nextLabel = getTabataHiitNextLabel();
      speak(nextLabel ? `Rest. Next up: ${speakify(nextLabel)}` : 'Rest');
    } else if (phase === 'blockRest') {
      const th2 = S.tabataHiit;
      const nextBlock = th2.blocks[th2.blockIdx + 1];
      speak(nextBlock ? `Block complete. Rest for ${fmtSpeak(th2.blockRestDuration)}` : 'Block complete. Rest.');
    } else if (phase === 'cooldown') {
      speak('All stations completed. Begin cooldown');
    }
  }

  reqWakeLock();
  renderTabataHiitScreen();
  th.rafId = requestAnimationFrame(tabataHiitTick);
}

function getTabataHiitCurrentLabel() {
  const th = S.tabataHiit;
  if (th.mode === 'tabata-advanced') {
    const blk = th.blocks[th.blockIdx];
    if (!blk) return null;
    const slot = blk.slots[th.slotIdx];
    if (!slot || !slot._exercise) return null;
    const weightStr = slot.weight ? `, ${slot.weight} kilograms` : '';
    return `${slot._exercise.name}${weightStr}`;
  }
  if (th.mode === 'hiit-advanced') {
    const ex = th.exercises[th.exerciseIdx];
    if (!ex) return null;
    const weightStr = ex.weight ? `, ${ex.weight} kilograms` : '';
    return `${ex.name}${weightStr}`;
  }
  return null;
}

function getTabataHiitNextLabel() {
  const th = S.tabataHiit;
  if (th.mode === 'tabata-simple') return null;
  if (th.mode === 'tabata-advanced') {
    const blk = th.blocks[th.blockIdx];
    if (!blk) return null;
    const nextSlotIdx = th.slotIdx + 1;
    if (nextSlotIdx < blk.slots.length) {
      const slot = blk.slots[nextSlotIdx];
      return slot?._exercise?.name || null;
    }
    return null;
  }
  if (th.mode === 'hiit-advanced') {
    const nextIdx = (th.exerciseIdx + 1) % th.exercises.length;
    return th.exercises[nextIdx]?.name || null;
  }
  return null;
}

function tabataHiitTick() {
  const th = S.tabataHiit;
  if (!th.active || th.paused) return;

  const nowMs = performance.now();
  const remaining = th.phaseEndMs - nowMs;

  const cdEl = document.getElementById('th-countdown');
  if (cdEl) cdEl.textContent = fmtMM(Math.max(0, remaining) / 1000);

  const totalEl = document.getElementById('th-total');
  if (totalEl) totalEl.textContent = fmtMM((nowMs - th.startMs - th.totalPausedMs) / 1000);

  if ((th.phase === 'warmup' || th.phase === 'cooldown') && S.settings.voiceMode !== 'none') {
    const phaseDur = th.phase === 'warmup' ? th.warmupDuration : th.cooldownDuration;
    const elapsed = phaseDur - (remaining / 1000);
    if (!th.halfFired && elapsed >= phaseDur / 2) {
      th.halfFired = true;
      speak(th.phase === 'warmup' ? 'Halfway through warmup' : 'Halfway through cooldown');
    }
  }

  if (S.settings.voiceMode !== 'none') {
    const remSecs = Math.round(remaining / 1000);
    if (remSecs <= 5 && remSecs >= 1 && th.fiveCountFired !== remSecs) {
      th.fiveCountFired = remSecs;
      if (th.phase === 'warmup' && remSecs <= 3) speak(String(remSecs));
      if (th.phase === 'work') speak(String(remSecs));
      if (th.phase === 'rest' && remSecs <= 3) speak(String(remSecs));
    }
  }

  if (remaining <= 0) {
    advanceTabataHiitPhase();
    return;
  }

  th.rafId = requestAnimationFrame(tabataHiitTick);
}

function advanceTabataHiitPhase() {
  const th = S.tabataHiit;
  cancelAnimationFrame(th.rafId);
  th.active = false;

  // Log the phase that just completed with real timing
  th.phaseLapLog.push({
    phase: th.phase,
    blockIdx: th.blockIdx,
    roundNum: th.currentRound,
    startMs: th.currentPhaseStartMs || th.startMs,
    endMs: performance.now()
  });

  const mode = th.mode;
  const isSimple = mode === 'tabata-simple' || mode === 'hiit-simple';
  const isTabata = mode === 'tabata-simple' || mode === 'tabata-advanced';

  beep(880, 0.2, 0.5);

  if (th.phase === 'warmup') {
    if (S.settings.voiceMode !== 'none') speak('Warmup ending in 3, 2, 1');
    setTimeout(() => {
      th.slotIdx = 0; th.blockIdx = 0; th.exerciseIdx = 0; th.currentRound = 1;
      startTabataHiitPhase('work', isTabata ? 20 : th.workDuration);
    }, 1000);
    return;
  }

  if (th.phase === 'work') {
    startTabataHiitPhase('rest', isTabata ? 10 : th.restDuration);
    return;
  }

  if (th.phase === 'rest') {
    if (isTabata) {
      const blk = th.blocks[th.blockIdx];
      const totalSlots = isSimple ? 8 : (blk ? blk.slots.length : 8);
      th.slotIdx++;
      if (th.slotIdx >= totalSlots) {
        th.slotIdx = 0;
        th.blockIdx++;
        if (th.blockIdx >= th.totalRounds) {
          endTabataHiitWorkout();
          return;
        }
        startTabataHiitPhase('blockRest', th.blockRestDuration);
        return;
      }
      startTabataHiitPhase('work', 20);
    } else {
      const exerciseCount = isSimple ? 1 : th.exercises.length;
      if (!isSimple) {
        th.exerciseIdx = (th.exerciseIdx + 1) % exerciseCount;
      }
      if (isSimple || th.exerciseIdx === 0) {
        th.currentRound++;
        if (th.currentRound > th.totalRounds) {
          endTabataHiitWorkout();
          return;
        }
      }
      startTabataHiitPhase('work', th.workDuration);
    }
    return;
  }

  if (th.phase === 'blockRest') {
    th.currentRound = th.blockIdx + 1;
    startTabataHiitPhase('work', isTabata ? 20 : th.workDuration);
    return;
  }

  if (th.phase === 'cooldown') {
    if (S.settings.voiceMode !== 'none') speak('Cooldown complete');
    setTimeout(() => showTabataHiitComplete(), 500);
    return;
  }
}

function endTabataHiitWorkout() {
  const th = S.tabataHiit;
  if (S.settings.voiceMode !== 'none') {
    const nowMs = performance.now();
    const wallMs = nowMs - th.startMs;
    speak(speakify(`All stations completed. Total time, ${fmtSpeak(wallMs / 1000)}`));
  }
  if (th.cooldownDuration > 0) {
    startTabataHiitPhase('cooldown', th.cooldownDuration);
  } else {
    setTimeout(() => showTabataHiitComplete(), 600);
  }
}

function showTabataHiitComplete() {
  const th = S.tabataHiit;
  th.active = false;
  relWakeLock();
  cancelAnimationFrame(th.rafId);
  const nowMs = performance.now();
  const totalMs = nowMs - th.startMs - th.totalPausedMs;
  const wallClockMs = nowMs - th.startMs;

  const isSimple = th.mode === 'tabata-simple' || th.mode === 'hiit-simple';
  const isTabata = th.mode === 'tabata-simple' || th.mode === 'tabata-advanced';
  const defaultName = isTabata
    ? (isSimple ? `Tabata Simple · ${todayStr()}` : (th.wod?.name || `Tabata · ${todayStr()}`))
    : (isSimple ? `HIIT Simple · ${todayStr()}` : (th.wod?.name || `HIIT · ${todayStr()}`));

  showModal(`
  <div style="text-align:center;padding:8px 0;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:56px;color:var(--text-hi);margin-bottom:8px;letter-spacing:-2px;">${fmtFull(totalMs/1000)}</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;margin-bottom:4px;">Workout Complete!</div>
    <div style="font-family:'DM Sans',sans-serif;color:var(--text-mid);font-size:14px;margin-bottom:24px;">${esc(defaultName)}</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-primary btn-full" onclick="saveTabataHiitSession(${wallClockMs})">Save &amp; View Summary</button>
      <button class="btn-ghost btn-full" onclick="hideModal();nav('home')" style="color:var(--text-mid);font-size:14px;">Discard</button>
    </div>
  </div>`);
}

async function saveTabataHiitSession(wallClockMs) {
  const th = S.tabataHiit;
  const isSimple = th.mode === 'tabata-simple' || th.mode === 'hiit-simple';
  const isTabata = th.mode === 'tabata-simple' || th.mode === 'tabata-advanced';
  const defaultName = isTabata
    ? (isSimple ? `Tabata Simple · ${todayStr()}` : (th.wod?.name || `Tabata · ${todayStr()}`))
    : (isSimple ? `HIIT Simple · ${todayStr()}` : (th.wod?.name || `HIIT · ${todayStr()}`));

  // Build laps from phaseLapLog — real measured durations
  const lapsArr = [];
  let lapNum = 1;

  if (isTabata) {
    // Group work+rest phases by blockIdx into one exercise lap per block
    const blockGroups = {};
    const blockRests = [];
    for (const entry of th.phaseLapLog) {
      const dur = (entry.endMs - entry.startMs) / 1000;
      if (entry.phase === 'work' || entry.phase === 'rest') {
        const bi = entry.blockIdx;
        if (!blockGroups[bi]) blockGroups[bi] = 0;
        blockGroups[bi] += dur;
      } else if (entry.phase === 'blockRest') {
        // blockIdx here is already the next block (post-increment), so afterBlock = blockIdx - 1
        blockRests.push({ afterBlock: entry.blockIdx - 1, dur });
      }
    }
    const blockKeys = Object.keys(blockGroups).map(Number).sort((a, b) => a - b);
    for (const bi of blockKeys) {
      const blkName = (!isSimple && th.blocks[bi]) ? th.blocks[bi].name : `Block ${bi + 1}`;
      lapsArr.push({ lapNumber: lapNum++, type: 'exercise', label: blkName, duration: Math.round(blockGroups[bi]), continued: false });
      const rest = blockRests.find(r => r.afterBlock === bi);
      if (rest) {
        lapsArr.push({ lapNumber: lapNum++, type: 'pause', label: 'Block Rest', duration: Math.round(rest.dur), continued: false });
      }
    }
  } else {
    // HIIT: group work+rest phases by roundNum into one exercise lap per round
    const roundGroups = {};
    for (const entry of th.phaseLapLog) {
      if (entry.phase === 'work' || entry.phase === 'rest') {
        const r = entry.roundNum;
        if (!roundGroups[r]) roundGroups[r] = 0;
        roundGroups[r] += (entry.endMs - entry.startMs) / 1000;
      }
    }
    const roundKeys = Object.keys(roundGroups).map(Number).sort((a, b) => a - b);
    for (const r of roundKeys) {
      lapsArr.push({ lapNumber: lapNum++, type: 'exercise', label: `Round ${r}`, duration: Math.round(roundGroups[r]), continued: false });
    }
  }

  const session = {
    id: th.sessionId || uid(),
    wodId: th.wod?.id || null,
    wodName: defaultName,
    tabataMode: isTabata,
    hiitMode: !isTabata,
    tabataHiitSubmode: th.mode,
    startedAt: Date.now() - wallClockMs,
    endedAt: Date.now(),
    totalDuration: wallClockMs / 1000,
    blocksCompleted: isTabata ? (th.blockIdx || th.totalRounds) : 0,
    roundsCompleted: !isTabata ? (th.currentRound > 1 ? th.currentRound - 1 : th.totalRounds) : 0,
    laps: lapsArr,
    journalPending: true,
    journal: null
  };

  await DB.put('sessions', session);
  hideModal();
  S.summaryId = session.id;
  await nav('summary', { sessionId: session.id });
}

function pauseTabataHiit() {
  const th = S.tabataHiit;
  if (!th.active || th.paused) return;
  const nowMs = performance.now();
  th.phaseRemaining = Math.max(0, th.phaseEndMs - nowMs);
  th.phaseEndMs = 0;
  th.paused = true;
  th.pauseStartMs = nowMs;
  cancelAnimationFrame(th.rafId);
  relWakeLock();
  if (S.settings.voiceMode !== 'none') speak('Training paused');
  document.getElementById('pause-overlay').style.display = 'flex';
  th.pauseRafId = requestAnimationFrame(pauseTabataHiitTick);
}

function resumeTabataHiit() {
  const th = S.tabataHiit;
  if (!th.active || !th.paused) return;
  const nowMs = performance.now();
  th.totalPausedMs += nowMs - th.pauseStartMs;
  th.paused = false;
  th.phaseEndMs = nowMs + (th.phaseRemaining || 0);
  th.phaseRemaining = 0;
  cancelAnimationFrame(th.pauseRafId);
  reqWakeLock();
  document.getElementById('pause-overlay').style.display = 'none';
  if (S.settings.voiceMode !== 'none') speak('Training resumed');
  th.rafId = requestAnimationFrame(tabataHiitTick);
}

function pauseTabataHiitTick() {
  const th = S.tabataHiit;
  if (!th.paused) return;
  const pauseEl = document.getElementById('pause-counter');
  if (pauseEl) pauseEl.textContent = fmtMM((performance.now() - th.pauseStartMs) / 1000);
  th.pauseRafId = requestAnimationFrame(pauseTabataHiitTick);
}

function renderTabataHiitScreen() {
  const th = S.tabataHiit;
  const screen = document.getElementById('screen-timer');
  if (!screen) return;

  const isTabata = th.mode === 'tabata-simple' || th.mode === 'tabata-advanced';
  const isSimple = th.mode === 'tabata-simple' || th.mode === 'hiit-simple';
  const phase = th.phase;

  const phaseColors = {
    warmup: 'var(--text-mid)', work: 'var(--text-hi)',
    rest: 'var(--bronze)', blockRest: 'var(--bronze)', cooldown: 'var(--text-mid)'
  };
  const phaseLabels = {
    warmup: 'WARMUP', work: 'WORK', rest: 'REST',
    blockRest: 'REST', cooldown: 'COOLDOWN'
  };
  const phaseColor = phaseColors[phase] || 'var(--text-hi)';
  const phaseLabel = phaseLabels[phase] || '';

  let nowName = '';
  let nowDetail = '';
  if (!isSimple && phase === 'work') {
    if (isTabata) {
      const blk = th.blocks[th.blockIdx];
      const slot = blk?.slots[th.slotIdx];
      nowName = slot?._exercise?.name || '';
      if (slot?.weight) nowDetail = `${slot.weight} kg`;
    } else {
      const ex = th.exercises[th.exerciseIdx];
      nowName = ex?.name || '';
      if (ex?.weight) nowDetail = `${ex.weight} kg`;
    }
  }

  let nextName = '';
  if (phase === 'work' && !isSimple) {
    nextName = getTabataHiitNextLabel() || '';
  }

  let progressLine = '';
  if (phase === 'warmup') {
    progressLine = 'WARMUP';
  } else if (phase === 'cooldown') {
    progressLine = 'COOLDOWN';
  } else if (phase === 'blockRest') {
    progressLine = 'BLOCK REST';
  } else if (isTabata) {
    const totalSlots = isSimple ? 8 : (th.blocks[th.blockIdx]?.slots?.length || 8);
    const blockLabel = !isSimple && th.blocks[th.blockIdx] ? th.blocks[th.blockIdx].name : `Block ${th.blockIdx + 1}`;
    progressLine = `${blockLabel} · ${th.slotIdx + 1} OF ${totalSlots}`;
  } else {
    progressLine = `ROUND ${th.currentRound} OF ${th.totalRounds}`;
  }

  const nowMs = performance.now();
  const remainingMs = th.phaseEndMs > 0 ? Math.max(0, th.phaseEndMs - nowMs) : 0;
  const wallMs = th.startMs > 0 ? (nowMs - th.startMs - th.totalPausedMs) : 0;

  const canGoBack = (isTabata && (th.slotIdx > 0 || th.blockIdx > 0)) || (!isTabata && (th.exerciseIdx > 0 || th.currentRound > 1));

  screen.innerHTML = `
  <div id="timer-main-layout" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
    <div class="timer-top-bar">
      <div style="flex:1;"></div>
    </div>

    <div class="timer-content" id="th-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;color:var(--text-mid);letter-spacing:0.08em;margin-bottom:6px;padding-left:2px;">${progressLine}</div>
      <div class="now-card">
        <div class="now-overline" style="color:${phaseColor};">${phaseLabel}</div>
        ${nowName ? `<div class="now-name">${esc(nowName.toUpperCase())}</div>` : `<div class="now-name" style="color:${phaseColor};">${phaseLabel}</div>`}
        ${nowDetail ? `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--text-mid);margin-top:4px;">${esc(nowDetail)}</div>` : ''}
      </div>

      <div class="timer-display-card">
        <div id="th-countdown" class="timer-num" style="color:${phase === 'work' ? 'var(--text-hi)' : 'var(--bronze)'};">${fmtMM(remainingMs / 1000)}</div>
        <div class="timer-sublabel" style="color:${phase === 'work' ? 'var(--text-hi)' : 'var(--bronze)'};">${phaseLabel}</div>
        <div class="timer-divider"></div>
        <div id="th-total" class="timer-num-sub">${fmtMM(wallMs / 1000)}</div>
        <div class="timer-sublabel">TOTAL TIME</div>
      </div>

      ${nextName ? `
      <div class="next-card">
        <div class="next-overline">Next Up</div>
        <div class="next-name">${esc(nextName.toUpperCase())}</div>
      </div>` : (phase === 'rest' || phase === 'blockRest') && !isSimple ? `
      <div class="next-card">
        <div class="next-overline">Next Up</div>
        <div class="next-name">${esc((getTabataHiitNextLabel() || '').toUpperCase())}</div>
      </div>` : ''}
    </div>

    <div class="timer-lap-bar">
      <div class="lap-controls-row">
        <button class="lap-btn-aux" onclick="prevTabataHiitPhase()" style="${!canGoBack ? 'opacity:0;pointer-events:none;' : ''}">‹</button>
        <button class="lap-btn-aux" onclick="${th.paused ? 'resumeTabataHiit()' : 'pauseTabataHiit()'}" style="flex:1;">${icons.pause}</button>
        <button class="lap-btn-aux" onclick="skipTabataHiitPhase()">›</button>
      </div>
    </div>
  </div>`;
}

function skipTabataHiitPhase() {
  cancelAnimationFrame(S.tabataHiit.rafId);
  advanceTabataHiitPhase();
}

function prevTabataHiitPhase() {
  const th = S.tabataHiit;
  cancelAnimationFrame(th.rafId);
  if (th.phase === 'work') {
    if (th.slotIdx > 0) { th.slotIdx--; }
    else if (th.exerciseIdx > 0) { th.exerciseIdx--; }
    startTabataHiitPhase('work', th.mode.startsWith('tabata') ? 20 : th.workDuration);
  } else if (th.phase === 'rest') {
    startTabataHiitPhase('work', th.mode.startsWith('tabata') ? 20 : th.workDuration);
  } else {
    startTabataHiitPhase(th.phase, th.phase === 'warmup' ? th.warmupDuration : th.phase === 'cooldown' ? th.cooldownDuration : th.blockRestDuration);
  }
}

let _countdownTimer = null;

async function beginCountdown(wod) {
  // Warm up speech synthesis in user gesture context before any awaits
  if (window.speechSynthesis && S.settings.voiceMode !== 'none') {
    try { speak('Get ready'); } catch(e) {}
  }

  const exercises = await DB.all('exercises');
  const complexes = await DB.all('complexes');

  const t = S.timer;
  t.active = false;
  t.paused = false;
  t.startMs = 0;
  t.totalPausedMs = 0;
  t.pauseStartMs = 0;
  t.stationIdx = 0;
  t.stationActiveMs = 0;
  t.stationSegmentStartMs = 0;
  t.stationSegments = [];
  t.completedStationTimes = [];
  t.laps = [];
  t.currentLapNumber = 1;
  t.canUndo = false;
  t.undoBackup = null;
  t.wakeLock = null;
  t.rafId = null;
  t.pauseRafId = null;
  t.sessionId = uid();
  t.wod = wod;
  t.stations = wod.stations || [];
  t.exercises = exercises;
  t.complexes = complexes;
  t.intervalEndMs = 0;
  t.intervalRemaining = 0;
  t.lapLocked = false;
  t.amrapHalfFired = false;
  t.amrapTenFired = false;
  t.amrapCountdownFired = 0;
  t.emomMode = wod.emomMode || false;
  t.emomDuration = wod.emomDuration || 60;
  t.totalRounds = wod.emomRounds || 0;
  t.currentRound = 1;
  t.emomFiveFired = false;
  t.emomCountFired = 0;

  if (t.stations.length === 0) { toast('No stations in this WOD'); return; }

  showScreen('timer');
  renderTimerScreen();

  const overlay = document.getElementById('countdown-overlay');
  const numEl = document.getElementById('countdown-num');
  const stLabel = document.getElementById('countdown-station');
  overlay.classList.add('active');

  const firstStation = t.stations[0];
  stLabel.textContent = getStationName(firstStation, exercises, complexes).toUpperCase();

  const dur = S.settings.countdownDuration || 3;
  let count = dur;

  function tick() {
    numEl.style.animation = 'none';
    numEl.offsetHeight;
    numEl.style.animation = 'countPop 0.25s ease forwards';
    numEl.textContent = count;
    if (count > 0) {
      beep(440, 0.12, 0.5);
    }
    if (count <= 0) {
      numEl.textContent = 'GO!';
      beep(880, 0.4, 0.8);
      if (S.timer.emomMode) {
        speak(speakify(`Round 1. ${getStationName(firstStation, exercises, complexes)}`));
      } else {
        speakStation(firstStation, exercises, complexes);
      }
      setTimeout(() => {
        overlay.classList.remove('active');
        startTimer();
        if (isIntervalStation(t.stations[0], t.exercises)) {
          t.intervalEndMs = performance.now() + getIntervalDuration(t.stations[0]);
        }
      }, 800);
      return;
    }
    count--;
    _countdownTimer = setTimeout(tick, 1000);
  }

  const ctx = getACtx();
  if (ctx.state === 'suspended') { await ctx.resume().catch(() => {}); }
  tick();
}

function cancelCountdown() {
  if (_countdownTimer) { clearTimeout(_countdownTimer); _countdownTimer = null; }
  const overlay = document.getElementById('countdown-overlay');
  if (overlay) overlay.classList.remove('active');
  S.timer.active = false;
  nav('wod-library');
}

function startNow() {
  if (_countdownTimer) { clearTimeout(_countdownTimer); _countdownTimer = null; }
  const overlay = document.getElementById('countdown-overlay');
  if (overlay) overlay.classList.remove('active');
  const t = S.timer;
  startTimer();
  if (t.emomMode) {
    t.intervalEndMs = performance.now() + (t.emomDuration * 1000);
  } else if (isIntervalStation(t.stations[0], t.exercises)) {
    t.intervalEndMs = performance.now() + getIntervalDuration(t.stations[0]);
  }
}

function startTimer() {
  const t = S.timer;
  t.active = true;
  t.paused = false;
  t.startMs = performance.now();
  t.stationSegmentStartMs = performance.now();
  t.stationSegmentStartOffset = 0;
  t.stationSegments = [];
  t.stationActiveMs = 0;
  if (t.emomMode) {
    t.intervalEndMs = performance.now() + (t.emomDuration * 1000);
  }
  reqWakeLock();
  renderTimerScreen();
  t.rafId = requestAnimationFrame(timerTick);
}

function timerTick() {
  const t = S.timer;
  if (!t.active || t.paused) return;
  const nowMs = performance.now();
  const stationMs = t.stationActiveMs + (nowMs - t.stationSegmentStartMs);
  const el = document.getElementById('timer-display');
  const st_el = document.getElementById('station-display');
  if (el) el.textContent = fmtMM(stationMs / 1000);
  if (st_el) st_el.textContent = fmtMM((nowMs - t.startMs) / 1000);

  if (t.intervalEndMs > 0) {
    const remaining = t.intervalEndMs - nowMs;
    const cdEl = document.getElementById('interval-countdown');
    if (cdEl) cdEl.textContent = fmtMM(Math.max(0, remaining) / 1000);

    // AMRAP voice cues — only for AMRAP stations with duration > 30s
    const _amrapSt = t.stations[t.stationIdx];
    const _isAmrap = _amrapSt && _amrapSt.unit === 'amrap';
    const _amrapDur = _isAmrap ? (_amrapSt.time || 0) : 0;

    if (_isAmrap && _amrapDur > 30 && S.settings.voiceMode !== 'none') {
      const _remSecs = Math.round(remaining / 1000);
      const _elapsed = _amrapDur - (remaining / 1000);

      if (!t.amrapHalfFired && _elapsed >= _amrapDur / 2 - 1) {
        t.amrapHalfFired = true;
        speak(speakify('Halfway there'));
      }
      if (!t.amrapTenFired && _remSecs <= 11 && _remSecs > 6) {
        t.amrapTenFired = true;
        speak(speakify('Last 10 seconds'));
      }
      if (_remSecs <= 5 && _remSecs >= 1 && t.amrapCountdownFired !== _remSecs) {
        t.amrapCountdownFired = _remSecs;
        speak(speakify(String(_remSecs)));
      }
    }

    // EMOM countdown cues
    if (t.emomMode && S.settings.voiceMode !== 'none') {
      const _eRemSecs = Math.round(remaining / 1000);
      if (_eRemSecs <= 5 && _eRemSecs >= 1 && t.emomCountFired !== _eRemSecs) {
        t.emomCountFired = _eRemSecs;
        speak(String(_eRemSecs));
      }
    }

    if (remaining <= 0) {
      if (t.emomMode) {
        beep(880, 0.3, 0.8);
        pressLap(true, true);
      } else {
        pressLap(true);
      }
      return;
    }
  }

  t.rafId = requestAnimationFrame(timerTick);
}

function pauseTick() {
  const t = S.timer;
  if (!t.paused) return;
  const pauseMs = performance.now() - t.pauseStartMs;
  const pauseEl = document.getElementById('pause-counter');
  if (pauseEl) pauseEl.textContent = fmtMM(pauseMs / 1000);

  const totalEl = document.getElementById('station-display');
  if (totalEl) {
    const wallMs = performance.now() - t.startMs;
    totalEl.textContent = fmtMM(wallMs / 1000);
  }

  t.pauseRafId = requestAnimationFrame(pauseTick);
}

function pauseTimer() {
  const t = S.timer;
  if (!t.active || t.paused) return;
  const nowMs = performance.now();
  const segMs = nowMs - t.stationSegmentStartMs;
  t.stationSegments.push({ durationMs: segMs, startOffset: t.stationSegmentStartOffset });
  t.stationActiveMs += segMs;

  if (t.intervalEndMs > 0) {
    t.intervalRemaining = Math.max(0, t.intervalEndMs - nowMs);
    t.intervalEndMs = 0;
  }

  t.paused = true;
  t.pauseStartMs = performance.now();
  cancelAnimationFrame(t.rafId);
  relWakeLock();
  document.getElementById('pause-overlay').style.display = 'flex';
  if (S.settings.voiceMode !== 'none') speak(speakify('Training paused'));
  t.pauseRafId = requestAnimationFrame(pauseTick);
}

function resumeTimer() {
  const t = S.timer;
  if (!t.active || !t.paused) return;
  const pauseDurMs = performance.now() - t.pauseStartMs;
  t.totalPausedMs += pauseDurMs;
  t.laps.push({
    lapNumber: null, type: 'pause', label: 'Paused',
    duration: pauseDurMs / 1000, startTime: performance.now() - t.startMs
  });
  t.paused = false;
  t.stationSegmentStartMs = performance.now();
  t.stationSegmentStartOffset = performance.now() - t.startMs;

  if (t.intervalRemaining > 0) {
    t.intervalEndMs = performance.now() + t.intervalRemaining;
    t.intervalRemaining = 0;
  }

  cancelAnimationFrame(t.pauseRafId);
  reqWakeLock();
  document.getElementById('pause-overlay').style.display = 'none';
  if (S.settings.voiceMode !== 'none') speak(speakify('Training resumed'));
  t.rafId = requestAnimationFrame(timerTick);
}

function pressLap(autoLap = false, isEmomCall = false) {
  const t = S.timer;
  if (!t.active || t.paused || t.lapLocked) return;
  const nowMs = performance.now();
  const finalSegMs = nowMs - t.stationSegmentStartMs;
  const totalStationMs = t.stationActiveMs + finalSegMs;
  t.completedStationTimes.push(totalStationMs);
  const st = t.stations[t.stationIdx];
  const label = stationLabel(st, t.exercises, t.complexes);
  const lapNum = t.currentLapNumber;

  t.undoBackup = {
    laps: [...t.laps],
    stationIdx: t.stationIdx,
    stationSegments: [...t.stationSegments],
    stationActiveMs: totalStationMs,
    stationSegmentStartOffset: t.stationSegmentStartOffset,
    currentLapNumber: lapNum,
    completedStationTimes: t.completedStationTimes.slice(0, -1)
  };

  t.stationSegments.push({ durationMs: finalSegMs, startOffset: t.stationSegmentStartOffset });

  t.stationSegments.forEach((seg, segIdx) => {
    t.laps.push({
      lapNumber: lapNum, type: 'exercise', label,
      duration: seg.durationMs / 1000,
      continued: segIdx > 0,
      startTime: seg.startOffset
    });
  });

  t.currentLapNumber++;
  t.canUndo = true;
  t.stationSegments = [];
  t.stationActiveMs = 0;
  cancelAnimationFrame(t.rafId);
  if (!isEmomCall) {
    if (autoLap) { beepAlert(); } else { beep(880, 0.15, 0.8); }
  }
  const lapBtn = document.getElementById('lap-btn');
  if (lapBtn) { lapBtn.style.animation = 'none'; lapBtn.offsetHeight; lapBtn.style.animation = 'lapPulse 0.2s ease'; }

  // EMOM: check if last station in cycle — wrap around
  if (t.emomMode) {
    const isLastStation = t.stationIdx >= t.stations.length - 1;
    if (isLastStation) {
      t.currentRound++;
      if (t.totalRounds > 0 && t.currentRound > t.totalRounds) {
        t.active = false;
        t.lapLocked = true;
        setTimeout(() => { t.lapLocked = false; }, 1000);
        relWakeLock();
        setTimeout(() => showWorkoutCompleteModal(), 350);
        return;
      }
      t.stationIdx = 0;
    } else {
      t.stationIdx++;
    }
    t.stationSegmentStartMs = performance.now();
    t.stationSegmentStartOffset = performance.now() - t.startMs;
    t.intervalEndMs = performance.now() + (t.emomDuration * 1000);
    t.amrapHalfFired = false; t.amrapTenFired = false; t.amrapCountdownFired = 0;
    t.emomFiveFired = false; t.emomCountFired = 0;
    const nextSt = t.stations[t.stationIdx];
    if (isLastStation) {
      speak(speakify(`Round ${t.currentRound}. ${getStationName(nextSt, t.exercises, t.complexes)}`));
    } else {
      speakStation(nextSt, t.exercises, t.complexes);
    }
    renderTimerScreen();
    t.rafId = requestAnimationFrame(timerTick);
    return;
  }

  if (t.stationIdx >= t.stations.length - 1) {
    t.active = false;
    t.lapLocked = true;
    setTimeout(() => { t.lapLocked = false; }, 1000);
    relWakeLock();
    setTimeout(() => showWorkoutCompleteModal(), 350);
  } else {
    t.stationIdx++;
    t.stationSegmentStartMs = performance.now();
    t.stationSegmentStartOffset = performance.now() - t.startMs;

    t.intervalEndMs = 0;
    t.intervalRemaining = 0;
    t.amrapHalfFired = false;
    t.amrapTenFired = false;
    t.amrapCountdownFired = 0;

    if (isIntervalStation(t.stations[t.stationIdx], t.exercises)) {
      t.intervalEndMs = performance.now() + getIntervalDuration(t.stations[t.stationIdx]);
    }

    const nextSt = t.stations[t.stationIdx];
    speakStation(nextSt, t.exercises, t.complexes);

    renderTimerScreen();
    t.rafId = requestAnimationFrame(timerTick);
  }
}

function undoLap() {
  const t = S.timer;
  if (!t.canUndo || !t.undoBackup) return;
  cancelAnimationFrame(t.rafId);
  const bk = t.undoBackup;
  t.laps = [...bk.laps];
  t.stationIdx = bk.stationIdx;
  t.stationSegments = [];
  t.stationActiveMs = bk.stationActiveMs;
  t.stationSegmentStartMs = performance.now();
  t.stationSegmentStartOffset = bk.stationSegmentStartOffset;
  t.currentLapNumber = bk.currentLapNumber;
  t.completedStationTimes = [...bk.completedStationTimes];
  t.canUndo = false;
  t.undoBackup = null;
  t.active = true;
  t.intervalEndMs = 0;
  t.intervalRemaining = 0;
  if (isIntervalStation(t.stations[t.stationIdx], t.exercises)) {
    t.intervalEndMs = performance.now() + getIntervalDuration(t.stations[t.stationIdx]);
  }
  renderTimerScreen();
  t.rafId = requestAnimationFrame(timerTick);
  toast('Lap undone');
  speakStation(t.stations[t.stationIdx], t.exercises, t.complexes);
}

function emomBack() {
  const t = S.timer;
  if (!t.emomMode) return;
  cancelAnimationFrame(t.rafId);
  if (t.stationIdx > 0) {
    t.stationIdx--;
  } else if (t.currentRound > 1) {
    t.currentRound--;
    t.stationIdx = t.stations.length - 1;
  } else {
    t.rafId = requestAnimationFrame(timerTick);
    return;
  }
  t.stationSegmentStartMs = performance.now();
  t.stationActiveMs = 0;
  t.stationSegments = [];
  t.intervalEndMs = performance.now() + (t.emomDuration * 1000);
  t.emomFiveFired = false;
  t.emomCountFired = 0;
  speakStation(t.stations[t.stationIdx], t.exercises, t.complexes);
  renderTimerScreen();
  t.rafId = requestAnimationFrame(timerTick);
}

function showWorkoutCompleteModal() {
  const t = S.timer;
  const nowMs = performance.now();
  const totalMs = nowMs - t.startMs - t.totalPausedMs;
  const wallClockMs = nowMs - t.startMs;
  if (S.settings.voiceMode !== 'none') {
    speak(speakify(`All stations completed. Total time, ${fmtSpeak(wallClockMs / 1000)}`));
  }
  showModal(`
  <div style="text-align:center;padding:8px 0;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:56px;color:var(--text-hi);margin-bottom:8px;letter-spacing:-2px;">${fmtFull(totalMs/1000)}</div>
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;margin-bottom:4px;">Workout Complete!</div>
    <div style="font-family:'DM Sans',sans-serif;color:var(--text-mid);font-size:14px;margin-bottom:24px;">${esc(t.wod ? t.wod.name : '')}</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-primary btn-full" onclick="hideModal();finishAndSaveSession()">Save &amp; View Summary</button>
      <button class="btn-ghost btn-full" onclick="cancelLastLap()" style="color:var(--text-mid);font-size:14px;">&#8617; Return to Timer</button>
    </div>
  </div>`);
}

function cancelLastLap() {
  hideModal();
  const t = S.timer;
  if (!t.undoBackup) { t.active = true; renderTimerScreen(); t.rafId = requestAnimationFrame(timerTick); return; }
  t.laps = [...t.undoBackup.laps];
  t.stationIdx = t.undoBackup.stationIdx;
  t.stationSegments = [];
  t.stationActiveMs = t.undoBackup.stationActiveMs;
  t.stationSegmentStartMs = performance.now();
  t.stationSegmentStartOffset = t.undoBackup.stationSegmentStartOffset;
  t.currentLapNumber = t.undoBackup.currentLapNumber;
  t.completedStationTimes = [...t.undoBackup.completedStationTimes];
  t.canUndo = false;
  t.undoBackup = null;
  t.active = true;
  t.intervalEndMs = 0;
  t.intervalRemaining = 0;
  if (isIntervalStation(t.stations[t.stationIdx], t.exercises)) {
    t.intervalEndMs = performance.now() + getIntervalDuration(t.stations[t.stationIdx]);
  }
  renderTimerScreen();
  t.rafId = requestAnimationFrame(timerTick);
}

async function finishAndSaveSession() {
  const t = S.timer;
  const nowMs = performance.now();
  const wallClockMs = nowMs - t.startMs;

  const session = {
    id: t.sessionId || uid(),
    wodId: t.wod ? t.wod.id : null,
    wodName: t.wod ? t.wod.name : 'Workout',
    wodStations: t.wod ? (t.wod.stations || []) : [],
    startedAt: Date.now() - wallClockMs,
    endedAt: Date.now(),
    totalDuration: wallClockMs / 1000,
    laps: [...t.laps],
    journalPending: true,
    journal: null,
    emomMode: t.emomMode || false,
    emomDuration: t.emomDuration || 60,
    totalRounds: t.currentRound - 1
  };

  await DB.put('sessions', session);
  S.summaryId = session.id;
  t.active = false;
  relWakeLock();
  cancelAnimationFrame(t.rafId);
  cancelAnimationFrame(t.pauseRafId);
  document.getElementById('pause-overlay').style.display = 'none';
  hideModal();
  await nav('summary', { sessionId: session.id });
}

async function stopWorkout() {
  showModal(`
  <div style="text-align:center;padding:8px 0;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-bottom:12px;">Stop Workout?</div>
    <div style="font-family:'DM Sans',sans-serif;color:var(--text-mid);margin-bottom:20px;font-size:15px;">Choose how to end this session.</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-ghost btn-full" onclick="hideModal();resumeTimer()">Continue</button>
      <button class="btn-primary btn-full" onclick="hideModal();finishAndSaveSession()">Stop &amp; Save</button>
      <button class="btn-danger btn-full" onclick="confirmDiscardWorkout()">Stop &amp; Discard</button>
    </div>
  </div>`);
}

function confirmDiscardWorkout() {
  showModal(`
  <div style="text-align:center;padding:8px 0;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;margin-bottom:12px;color:var(--error);">Discard Session?</div>
    <div style="font-family:'DM Sans',sans-serif;color:var(--text-mid);margin-bottom:20px;font-size:15px;">This session will not be saved.</div>
    <div style="display:flex;gap:10px;">
      <button class="btn-ghost btn-full" onclick="hideModal();resumeTimer()">Cancel</button>
      <button class="btn-danger btn-full" onclick="discardWorkout()">Discard</button>
    </div>
  </div>`);

function discardWorkout() {
  const t = S.timer;
  t.active = false;
  cancelAnimationFrame(t.rafId);
  cancelAnimationFrame(t.pauseRafId);
  relWakeLock();
  document.getElementById('pause-overlay').style.display = 'none';
  hideModal();
  nav('home');
}

// ============================================================
// TIMER RENDER
// ============================================================
function renderTimerScreen() {
  const t = S.timer;
  const screen = document.getElementById('screen-timer');
  if (!screen) return;

  const stations = t.stations;
  const exercises = t.exercises;
  const complexes = t.complexes;
  const idx = t.stationIdx;
  const st = stations[idx];
  if (!st) return;

  const stName = getStationName(st, exercises, complexes);
  const isCardio = st.type === 'cardio';
  const ex = st.exerciseId ? exercises.find(e => e.id === st.exerciseId) : null;
  const cx = st.complexId ? complexes.find(c => c.id === st.complexId) : null;
  const spec = st.type === 'complex'
    ? (st.reps && st.reps > 1 ? `${st.reps} rounds` : '1 round')
    : stationSpecLine(st, exercises, complexes);
  const currentIsInterval = isIntervalStation(st, exercises);
  const isEmom = t.emomMode === true;

  let complexHtml = '';
  if (st.type === 'complex' && cx) {
    const chain = (cx.movements||[]).map(m => `${m.reps}\u00D7 ${m.name}`).join(' \u2192 ');
    complexHtml = `<div class="complex-card">
    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;text-transform:uppercase;color:var(--text-hi);line-height:1.3;letter-spacing:0.04em;">${esc(chain)}</div>
  </div>`;
  }

  let dotsHtml = '';
  if (isEmom) {
    const currentInterval = (t.currentRound - 1) * stations.length + idx + 1;
    const totalIntervals = t.totalRounds > 0 ? t.totalRounds * stations.length : null;
    const intervalPart = totalIntervals ? `STATION ${currentInterval} OF ${totalIntervals}` : `STATION ${currentInterval}`;
    const roundPart = t.totalRounds > 0 ? `ROUND ${t.currentRound} OF ${t.totalRounds}` : `ROUND ${t.currentRound}`;
    dotsHtml = `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;text-transform:uppercase;color:var(--text-mid);letter-spacing:0.08em;">${intervalPart}<span style="color:var(--text-lo);margin:0 8px;">·</span>${roundPart}</div>`;
  } else if (stations.length <= 16) {
    dotsHtml = `<div class="progress-dots">` +
      stations.map((s, i) =>
        `<div class="progress-dot ${i < idx ? 'done' : i === idx ? 'current' : ''}"></div>`
      ).join('') +
    `</div>`;
  } else {
    const pct = stations.length > 1 ? (idx / (stations.length - 1)) * 100 : 0;
    dotsHtml = `<div class="timer-progress-bar" style="flex:1;">
      <div class="timer-progress-fill" style="width:${pct}%"></div>
    </div>`;
  }

  let effectiveNextSt = stations[idx + 1];
  // EMOM: on last station of a round, show first station of next round (not FINISH LINE)
  // unless this is the actual last interval
  if (!effectiveNextSt && isEmom) {
    const isActuallyLast = t.totalRounds > 0 && t.currentRound >= t.totalRounds;
    if (!isActuallyLast) effectiveNextSt = stations[0];
  }
  const nextSt = effectiveNextSt;
  let nextHtml;
  if (!nextSt) {
    nextHtml = `
  <div class="next-card">
    <div class="next-overline">After This</div>
    <div class="next-name" style="color:var(--yellow);">FINISH LINE</div>
  </div>`;
  } else {
    const nextName = getStationName(nextSt, exercises, complexes);
    const nextSpec = stationSpecLine(nextSt, exercises, complexes);
    const nextIsInterval = isIntervalStation(nextSt, exercises);
    const nextIsAmrap = nextSt.unit === 'amrap';
    let nextDetail = '';
    if (nextIsInterval) {
      nextDetail = fmtMM(getIntervalDuration(nextSt) / 1000);
    } else if (nextIsAmrap) {
      nextDetail = `AMRAP ${fmtMM(nextSt.time || 0)}`;
    } else if (nextSpec) {
      nextDetail = nextSpec;
    }
    const nextCx = nextSt.complexId ? complexes.find(c => c.id === nextSt.complexId) : null;
    if (nextSt.type === 'complex' && nextCx) {
      nextDetail = nextCx.movements.map(m => `${m.reps}\u00D7 ${m.name}`).join(' \u2192 ');
    }
    nextHtml = `
  <div class="next-card">
    <div class="next-overline">Next Up</div>
    <div class="next-name">${esc(nextName)}</div>
    ${nextDetail ? `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--text-mid);margin-top:4px;letter-spacing:0.03em;text-transform:uppercase;">${esc(nextDetail)}</div>` : ''}
  </div>`;
  }

  const nowMs = performance.now();
  const stationMs = t.active && !t.paused
    ? t.stationActiveMs + (nowMs - t.stationSegmentStartMs)
    : t.stationActiveMs;
  const wallMs = t.active ? (nowMs - t.startMs) : 0;

  let timerInnerHtml;
  if (isEmom) {
    const remainingMs = t.intervalEndMs > 0
      ? Math.max(0, t.intervalEndMs - nowMs)
      : (t.emomDuration * 1000);
    timerInnerHtml = `
    <div id="interval-countdown" class="timer-num" style="color:var(--bronze);">${fmtMM(remainingMs / 1000)}</div>
    <div class="timer-sublabel" style="color:var(--bronze);">INTERVAL</div>
    <div class="timer-divider"></div>
    <div id="station-display" class="timer-num-sub">${fmtMM(wallMs / 1000)}</div>
    <div class="timer-sublabel">TOTAL TIME</div>`;
  } else if (currentIsInterval) {
    const remainingMs = t.intervalEndMs > 0
      ? Math.max(0, t.intervalEndMs - nowMs)
      : getIntervalDuration(st);
    timerInnerHtml = `
    <div id="interval-countdown" class="timer-num" style="color:var(--bronze);">${fmtMM(remainingMs / 1000)}</div>
    <div class="timer-sublabel" style="color:var(--bronze);">TIME REMAINING</div>

    timerInnerHtml = `
    <div id="timer-display" class="timer-num">${fmtMM(stationMs / 1000)}</div>
    <div class="timer-sublabel">STATION TIME</div>
    <div class="timer-divider"></div>
    <div id="station-display" class="timer-num-sub">${fmtMM(wallMs / 1000)}</div>

    <div class="wod-panel-title">${esc(t.wod ? t.wod.name : '')}</div>
    ${stations.map((s, i) => {
      const lbl = stationLabel(s, exercises, complexes);

      const done = i < idx;
      const cur = i === idx;

      let detailLine = '';
      if (isInt) {
        detailLine = fmtMM(getIntervalDuration(s) / 1000);
      } else if (isAm) {
        detailLine = `AMRAP ${fmtMM(s.time || 0)}`;
      } else if (s.type === 'complex' && sCx) {
        detailLine = sCx.movements.map(m => `${m.reps}\u00D7 ${m.name}`).join(' \u2192 ');

        detailLine = spec;

  const nowNameColor = currentIsInterval ? 'color:var(--bronze);' : isCardio ? 'color:var(--yellow);' : '';

  screen.innerHTML = `
  <div id="timer-main-layout" style="display:flex;flex-direction:row;height:100%;overflow:hidden;">
    <div id="timer-left-col" style="display:flex;flex-direction:column;overflow:hidden;flex:1;">
      <div class="timer-top-bar">
        <div style="display:flex;align-items:center;gap:10px;flex:1;">
          ${dotsHtml}
        </div>
        ${wodViewBtn}

        <div class="now-card station-enter">
          <div class="now-overline">${currentIsInterval ? 'INTERVAL' : isCardio ? 'ENDURANCE' : 'NOW'}</div>
          <div class="now-name" style="${nowNameColor}">${esc(stName.toUpperCase())}</div>
          ${spec ? `<div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--text-mid);margin-top:5px;letter-spacing:0.03em;text-transform:uppercase;">${esc(spec)}</div>` : ''}
        </div>
        ${complexHtml}
        <div class="timer-display-card">
          ${timerInnerHtml}
        </div>
        ${nextHtml}
      </div>

        ${controlsHtml}
      </div>
    </div>
    <div id="timer-right-col" style="display:none;flex:0 0 42%;overflow-y:auto;background:var(--bg-page);border-left:1px solid var(--rule);padding:16px;">
      ${wodRightHtml}
    </div>
  </div>`;

  checkLandscape();
}

function checkLandscape() {
  const isLandscape = window.innerWidth >= 900 && window.innerWidth > window.innerHeight;
  const right = document.getElementById('timer-right-col');
  const leftCol = document.getElementById('timer-left-col');
  const viewWodBtn = document.getElementById('view-wod-btn');
  if (!right) return;
  if (isLandscape) {
    right.style.display = 'block';
    if (leftCol) leftCol.style.flex = '0 0 58%';
    if (viewWodBtn) viewWodBtn.style.display = 'none';
  } else {
    right.style.display = 'none';
    if (leftCol) leftCol.style.flex = '1';
    if (viewWodBtn) viewWodBtn.style.display = '';
  }
}

window.addEventListener('resize', () => {
  if (S.timer.active) checkLandscape();
});

async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch(e) {}
  }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px;font-size:16px;';
    document.body.appendChild(ta);
    const range = document.createRange();
    range.selectNodeContents(ta);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    ta.setSelectionRange(0, 999999);
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) return true;
  } catch(e) {}
  return false;
}

async function copyMarkdown() {
  if (!_cachedMarkdown) { toast('Nothing to copy'); return; }
  const ok = await copyToClipboard(_cachedMarkdown);
  if (ok) { toast('Copied!'); } else { toast('Copy failed — use Export CSV instead'); }
}

async function exportCSV(sessionId) {
  const session = await DB.get('sessions', sessionId);
  if (!session) return;
  const laps = [...(session.laps || [])].sort((a, b) => (a.startTime || 0) - (b.startTime || 0));
  let csv = 'Lap,Station,Spec,Duration\n';
  for (const l of laps) {
    if (l.type === 'pause') {
      csv += `,Paused,,${fmtMM(l.duration||0)}\n`;
    } else {
      const parts = (l.label || '').split(' · ');
      const name = parts[0] || '';
      const spec = parts.slice(1).join(' · ');
      const isCont = l.continued;
      csv += `${l.lapNumber || ''},${isCont ? name+' cont.' : name},${spec},${fmtMM(l.duration||0)}\n`;
    }
  }
  const totalExSecs = laps.filter(l => l.type === 'exercise').reduce((s, l) => s + (l.duration || 0), 0);
  csv += `TOTAL,,${fmtFull(totalExSecs)}\n`;
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `station-${(session.wodName || 'workout').replace(/\s+/g,'-')}-${fmtDate(session.startedAt).replace(/\s+/g,'-')}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV downloaded!');
}

async function confirmAddToLibrary(sessionId) {
  const session = await DB.get('sessions', sessionId);
  if (!session) return;
  const name = (document.getElementById('lib-wod-name')?.value || '').trim() || session.wodName || `WOD · ${todayStr()}`;
  const wod = {
    id: uid(),
    name,
    isPrebuilt: false,
    createdAt: Date.now(),
    stations: session.wodStations
  };
  await DB.put('wods', wod);
  session.wodId = wod.id;
  session.wodName = name;
  await DB.put('sessions', session);

async function saveJournal(sessionId) {
  const session = await DB.get('sessions', sessionId);
  if (!session) return;

  const getSlider = (key) => {
    const el = document.getElementById('slider-' + key);
    return el ? parseInt(el.value) || 5 : 5;
  };

  const notes = (document.getElementById('journal-notes')?.value || '').trim();

  session.journal = {
    energy: getSlider('energy'),
    rpe: getSlider('rpe'),
    breathing: getSlider('breathing'),
    hydration: getSlider('hydration'),
    soreness: getSlider('soreness'),
    satisfaction: getSlider('satisfaction'),
    notes,
    completedAt: Date.now()
  };
  session.journalPending = false;

  await DB.put('sessions', session);
  toast('Journal saved!');
  await renderJournal(sessionId);
}

async function copyJournal() {
  if (!_cachedJournal) { toast('Nothing to copy'); return; }
  const ok = await copyToClipboard(_cachedJournal);
  if (ok) { toast('Copied!'); } else { toast('Copy failed'); }
}

// -- WOD Export / Import --
async function exportWod(id) {
  const wod = await DB.get('wods', id);
  if (!wod) return;
  const allExercises = await DB.all('exercises');
  const allComplexes = await DB.all('complexes');
  const usedExIds = [...new Set(wod.stations.map(s => s.exerciseId).filter(Boolean))];
  const usedCxIds = [...new Set(wod.stations.map(s => s.complexId).filter(Boolean))];
  const usedExercises = allExercises.filter(e => usedExIds.includes(e.id));
  const usedComplexes = allComplexes.filter(c => usedCxIds.includes(c.id));
  const exportData = {
    version: '3.2',
    exportedAt: Date.now(),
    wod: { name: wod.name, tags: wod.tags || [], stations: wod.stations },
    exercises: usedExercises.map(e => ({
      id: e.id, name: e.name, equipment: e.equipment,
      defaultWeight: e.defaultWeight, defaultReps: e.defaultReps,
      defaultDistance: e.defaultDistance, defaultTime: e.defaultTime || 0, notes: e.notes || ''
    })),
    complexes: usedComplexes.map(c => ({
      id: c.id, name: c.name, movements: c.movements, isPrebuilt: c.isPrebuilt || false
    }))
  };
  const json = JSON.stringify(exportData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${wod.name.replace(/\s+/g,'-').toLowerCase()}-stations.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('WOD exported!');
}

function importWod() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.style.cssText = 'position:fixed;top:-9999px;';
  document.body.appendChild(input);
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) { document.body.removeChild(input); return; }
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      await processWodImport(data);
    } catch(err) {
      toast('Invalid file — could not import');
    }
    document.body.removeChild(input);
  };
  input.click();
}

async function processWodImport(data) {
  if (!data.wod || !data.wod.stations) { toast('Invalid WOD file'); return; }

  // Restore exercises
  const existingExercises = await DB.all('exercises');
  const existingExByName = {};
  for (const ex of existingExercises) { existingExByName[ex.name.toLowerCase()] = ex; }
  const exIdMap = {};
  for (const ex of (data.exercises || [])) {
    const existing = existingExByName[ex.name.toLowerCase()];
    if (existing) {
      exIdMap[ex.id] = existing.id;
    } else {
      const newEx = { ...ex, id: uid(), isPrebuilt: false, useCount: 0 };
      await DB.put('exercises', newEx);
      exIdMap[ex.id] = newEx.id;
    }
  }

  // Restore complexes
  const existingComplexes = await DB.all('complexes');
  const existingCxByName = {};
  for (const cx of existingComplexes) { existingCxByName[cx.name.toLowerCase()] = cx; }
  const cxIdMap = {};
  for (const cx of (data.complexes || [])) {
    const existing = existingCxByName[cx.name.toLowerCase()];
    if (existing) {
      cxIdMap[cx.id] = existing.id;
    } else {
      const newCx = { ...cx, id: uid(), isPrebuilt: false };
      await DB.put('complexes', newCx);
      cxIdMap[cx.id] = newCx.id;
    }
  }

  const stations = data.wod.stations.map(s => ({
    ...s, id: uid(),
    exerciseId: s.exerciseId ? (exIdMap[s.exerciseId] || s.exerciseId) : null,
    complexId: s.complexId ? (cxIdMap[s.complexId] || s.complexId) : null
  }));
  const newWod = {
    id: uid(), name: data.wod.name || 'Imported WOD',
    tags: data.wod.tags || [], isPrebuilt: false,
    createdAt: Date.now(), stations
  };
  // Auto-suffix if name already exists
  const _existingWods = await DB.all('wods');
  const _isDupeImport = (n) => _existingWods.some(w => w.name.toLowerCase() === n.toLowerCase());
  if (_isDupeImport(newWod.name)) {
    let _importCounter = 1;
    while (_isDupeImport(`${newWod.name} (${_importCounter})`)) _importCounter++;
    newWod.name = `${newWod.name} (${_importCounter})`;
  }
  await DB.put('wods', newWod);
  toast(`"${newWod.name}" imported!`);
  await renderWodLibrary();
}

    <p>When you tap <strong style="color:var(--text-hi);">+ New</strong> in the WOD Library, you choose a format first. Each format has its own timer behavior.</p>

    <p style="margin-top:10px;"><strong style="color:var(--text-hi);">EMOM</strong> — Every Minute On the Minute. The clock runs the workout. Set an interval (60, 90, or 120 seconds) and a round count. Each station gets one interval. When time is up, it moves automatically. Use <strong style="color:var(--text-hi);">›</strong> to skip ahead, <strong style="color:var(--text-hi);">‹</strong> to go back. No LAP button.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Running a Standard Workout</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p>1. Tap <strong style="color:var(--text-hi);">WOD Library</strong> → <strong style="color:var(--text-hi);">+ New</strong> → <strong style="color:var(--text-hi);">Standard</strong> — or open an existing WOD.</p>
    <p style="margin-top:6px;">2. Press <strong style="color:var(--text-hi);">Start</strong>.</p>
    <p style="margin-top:6px;">3. Do the work.</p>
    <p style="margin-top:6px;">4. Press <strong style="color:var(--text-hi);">LAP</strong> when done with each station.</p>
    <p style="margin-top:6px;">5. Repeat until the final station.</p>
    <p style="margin-top:6px;">6. Save your session and complete your <strong style="color:var(--text-hi);">Journal</strong>.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Running an EMOM</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p>1. Tap <strong style="color:var(--text-hi);">+ New</strong> → <strong style="color:var(--text-hi);">EMOM</strong>.</p>
    <p style="margin-top:6px;">2. Name your EMOM and set the interval duration (60 / 90 / 120s).</p>
    <p style="margin-top:6px;">3. Add your stations — each station = one movement.</p>
    <p style="margin-top:6px;">4. Set your round count using the <strong style="color:var(--text-hi);">[ − ] [ + ]</strong> control at the bottom.</p>
    <p style="margin-top:6px;">5. Press <strong style="color:var(--text-hi);">Save & Start</strong>. The clock handles the rest.</p>
    <p style="margin-top:6px;">The top bar shows your position: <strong style="color:var(--text-hi);">STATION 4 OF 15 · ROUND 2 OF 5</strong>.</p>
    <p style="margin-top:6px;">Voice announces each movement at the top of every interval. 5-4-3-2-1 countdown before each minute ends.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Station Types</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p><strong style="color:var(--text-hi);">Exercise</strong> — any strength or skill movement. Set weight, reps, distance, steps, or time.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Endurance</strong> — running, rowing, skiing, biking. Set your distance.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Complex</strong> — a chain of movements done back to back. e.g. 10× KB Swing → 5× KB Press.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Interval</strong> — a timed rest or transition block. Auto-advances when time runs out. Press LAP to skip early.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">AMRAP</strong> — As Many Reps As Possible. Set a time limit. Auto-advances when time is up.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Timer Explained</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p><strong style="color:var(--text-hi);">Station Time</strong> — how long you have been on the current station. Resets every LAP.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Total Time</strong> — wall-clock time from start to finish. Includes rest periods.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Interval / EMOM countdown</strong> — bronze number counting down to zero. Auto-advances at zero.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Pausing</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p>Press <strong style="color:var(--text-hi);">⏸</strong> to pause. A rest counter starts. Press <strong style="color:var(--text-hi);">Resume</strong> when ready.</p>
    <p style="margin-top:8px;">Pressed LAP by accident — press <strong style="color:var(--text-hi);">↩</strong> immediately to undo it. (Standard mode only.)</p>
    <p style="margin-top:8px;">During the countdown — tap <strong style="color:var(--text-hi);">Start Now</strong> to skip it and go immediately.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">After Your Workout</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p><strong style="color:var(--text-hi);">Summary</strong> — full session broken down by station. Toggle Advanced for programmed specs.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Journal</strong> — rate your session across 6 metrics. Takes 30 seconds.</p>
    <p style="margin-top:8px;"><strong style="color:var(--text-hi);">Export</strong> — copy as Markdown or download as CSV.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Tips</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p>Install to your Home Screen for the best experience — tap the share icon in Safari, then "Add to Home Screen."</p>
    <p style="margin-top:8px;">Voice announcements name the next station as you LAP — useful when your phone is on the floor.</p>
    <p style="margin-top:8px;">Enable <strong style="color:var(--text-hi);">Full Readout</strong> in Voice Settings to hear weight, reps, and distance at each station.</p>
    <p style="margin-top:8px;">Use the <strong style="color:var(--text-hi);">+ Rest</strong> button inside any station to quickly insert a rest block below it.</p>
    <p style="margin-top:8px;">In EMOM mode, voice announces the next movement at the top of every round. You'll also hear a 5-4-3-2-1 countdown before each interval ends.</p>
    <p style="margin-top:8px;">To move a WOD to another device — use <strong style="color:var(--text-hi);">Export</strong> in the WOD Library and <strong style="color:var(--text-hi);">Import</strong> on the other device.</p>

    <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;color:var(--text-hi);letter-spacing:0.05em;margin-top:28px;margin-bottom:8px;">Your Data</div>
    <div class="header-rule" style="margin-top:0;margin-bottom:14px;"></div>
    <p>Everything lives on your device. No account. No cloud. No ads.</p>

    <p style="margin-top:32px;font-family:'Barlow Condensed',sans-serif;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:0.2em;color:var(--text-lo);">Built for hybrid athletes. Tested in the garage.</p>

  </div>`;
}

// ============================================================
// INIT
// ============================================================
async function init() {
  try {
    await DB.open();
    const saved = await DB.get('settings', 'user-settings');
    if (saved) Object.assign(S.settings, saved);
    applyTheme();
    await seedData();
    await seedTagsIfEmpty();
    await seedTrxIfEmpty();
    await loadTabataSimpleSettings();
    const savedHiit = await DB.get('settings', 'hiit-simple-last');
    if (savedHiit) {
      S.hiitSimple.warmup = savedHiit.warmup || 0;
      S.hiitSimple.work = savedHiit.work || 20;
      S.hiitSimple.rest = savedHiit.rest || 10;
      S.hiitSimple.rounds = savedHiit.rounds || 8;
      S.hiitSimple.cooldown = savedHiit.cooldown || 0;
    }
    if (window.speechSynthesis) {
      voices = speechSynthesis.getVoices();
      if (!voices.length) {
        speechSynthesis.onvoiceschanged = () => { voices = speechSynthesis.getVoices(); };
      }
    }
    await renderHome();
    showScreen('home');
    document.addEventListener('touchstart', () => {
      getACtx();
      if (window.speechSynthesis && S.settings.voiceMode !== 'none') {
        try {
          const _w = new SpeechSynthesisUtterance('');
          _w.volume = 0;
          speechSynthesis.speak(_w);
        } catch(e) {}
      }
    }, { once: true, passive: true });
    document.addEventListener('click', () => getACtx(), { once: true });
  } catch(e) {
    console.error('Init error:', e);
    document.getElementById('screen-home').innerHTML = `
    <div style="text-align:center;padding:40px 20px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;color:var(--yellow);">STATIONS</div>
      <div style="color:var(--error);margin-top:20px;font-size:15px;">Failed to initialize: ${esc(e.message)}</div>
      <div style="color:var(--text-mid);margin-top:8px;font-size:13px;">Try reloading the page.</div>
      <button class="btn-primary btn-full" onclick="window.location.reload()" style="margin-top:24px;">Reload</button>
    </div>`;
    showScreen('home');
  }
}

init();
</script>
</body>
</html>
